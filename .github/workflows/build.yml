name: Build M5Stick S3 Firmware

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware for M5Stick S3
        run: platformio run -e m5stick-s3  # ← Changed to your new environment

      - name: Check build output
        run: find .pio -name "*.bin" -type f

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .pio/build/m5stack-sticks3/  # ← Match your environment + board folder
