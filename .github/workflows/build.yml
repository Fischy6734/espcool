name: PlatformIO CI (M5 Stick S3)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PlatformIO
        uses: platformio/platformio-action@v3

      - name: Build for M5 Stick S3
        uses: platformio/platformio-action@v3
        with:
          project-dir: .
          environment: m5stick-s3
          options: -v
