name: Build ESP32-S3 Firmware
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PlatformIO
        uses: platformio/platformio-core-action@v3
      - name: Build
        run: pio run -e esp32s3_devkitc_1
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: gpio-monitor-bin
          path: .pio/build/esp32s3_devkitc_1/firmware.bin
