[env:esp32-s3-devkitm-1]  # New environment for M5Stick S3
platform = espressif32
board = esp32-s3-devkitm-1  # Official PlatformIO board ID for M5Stick S3
framework = arduino
monitor_speed = 115200

# Required library (auto-downloaded by PlatformIO)
lib_deps = m5stack/M5Unified@^0.1.13  # Core library for M5 unified devices (including Stick S3)
