[env:m5stick-s3]  # New environment for M5Stick S3
platform = espressif32
board = m5stack-sticks3  # Official PlatformIO board ID for M5Stick S3
framework = arduino
monitor_speed = 115200

# Required library (auto-downloaded by PlatformIO)
lib_deps = m5stack/M5Unified@^0.1.13  # Core library for M5 unified devices (including Stick S3)
